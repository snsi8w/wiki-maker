<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>나무위키 문서 생성기</title>
<style>
body{font-family:"Noto Sans KR",sans-serif;background:#f6f6f6;padding:40px;}
.tab button{padding:10px 20px;cursor:pointer;margin-right:6px;}
.page{display:none;background:white;padding:25px;border:1px solid #ccc;margin-top:20px;}
.page.active{display:block;}
input,textarea{width:100%;padding:8px;margin-bottom:10px;}
textarea{height:120px;}
button{padding:6px 12px;}
.toolbar{margin-bottom:6px;}
.preview{background:white;border:1px solid #ccc;padding:30px;margin-top:30px;}
.wiki-title{font-size:32px;border-bottom:2px solid #444;margin-bottom:20px;}
.wiki-infobox{float:right;width:260px;background:white;margin-left:20px;}
.wiki-infobox table{width:100%;border-collapse:collapse;}
.wiki-infobox th,.wiki-infobox td{border:1px solid #ccc;padding:6px;}
.wiki-toc{border:1px solid #ccc;background:#fafafa;padding:15px;width:250px;margin:20px 0;}
.wiki-h{font-size:22px;border-bottom:1px solid #ccc;margin-top:35px;}
.characterQuote{background:#3a3c42;color:#eaeaea;padding:22px;margin:20px 0;border-left:8px solid #9aa0a6;
box-shadow:inset 0 0 0 2px rgba(255,255,255,0.08);}
.characterQuoteText{font-size:22px;line-height:1.5;}
.characterQuote hr{border:none;border-top:1px solid rgba(255,255,255,0.15);margin:14px 0;}
.characterQuoteChar{font-size:18px;color:#d8d8d8;}
#outputCode{white-space:pre-wrap;background:#fff;border:1px solid #ccc;padding:20px;margin-top:20px;}
</style>
</head>

<body>

<h1>나무위키 문서 생성기</h1>

<div class="tab">
<button onclick="openPage(0)">캐릭터</button>
<button onclick="openPage(1)">본문</button>
</div>

<div class="page active">

이름
<input id="title">

이미지 URL
<input id="image">

캐릭터 박스 테두리 색
<input type="color" id="boxColor" value="#4a90e2">

<div id="infoFields"></div>

<button onclick="addInfo()">항목 추가</button>

</div>

<div class="page">

<div id="sections"></div>

<button onclick="addSection()">문단 추가</button>

<hr>

유튜브 embed 링크
<input id="youtube">

<hr>

<button onclick="generate()">문서 생성</button>

<button onclick="copyCode()">티스토리 코드 복사</button>

</div>

<h2>미리보기</h2>
<div class="preview" id="preview"></div>

<h2>생성된 HTML</h2>
<div id="outputCode"></div>

<script>

function openPage(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.querySelectorAll(".page")[n].classList.add("active")
}

function addInfo(){
let div=document.createElement("div")
div.innerHTML=`
항목명
<input class="infoKey">
값
<input class="infoValue">
색
<input type="color" class="infoColor">
<hr>
`
document.getElementById("infoFields").appendChild(div)
}

let footnotes=[]
let footnoteCount=0

function addSection(){
let div=document.createElement("div")
div.innerHTML=`
문단 제목
<input class="secTitle">
<div class="toolbar">
<button onclick="formatText(this,'b')">굵게</button>
<button onclick="formatText(this,'i')">기울기</button>
<button onclick="formatText(this,'s')">취소선</button>
<button onclick="addFootnote(this)">각주</button>
<button onclick="addQuote(this)">캐릭터 대사</button>
</div>
<textarea class="secText"></textarea>
<hr>
`
document.getElementById("sections").appendChild(div)
}

function formatText(btn,type){
let textarea=btn.parentNode.nextElementSibling
textarea.value+=`<${type}>텍스트</${type}>`
}

function addFootnote(btn){
let textarea=btn.parentNode.nextElementSibling
let text=prompt("각주 내용")
if(!text) return
footnoteCount++
textarea.value+=`<sup>[${footnoteCount}]</sup>`
footnotes.push(text)
}

function addQuote(btn){
let textarea=btn.parentNode.nextElementSibling
let line=prompt("대사 입력")
let char=prompt("캐릭터 이름")
if(!line||!char) return
textarea.value+=`
<div class="characterQuote">
<div class="characterQuoteText">
${line}
</div>
<hr>
<div class="characterQuoteChar">
— ${char}
</div>
</div>
`
}

function generate(){

let title=document.getElementById("title").value
let image=document.getElementById("image").value
let youtube=document.getElementById("youtube").value
let boxColor=document.getElementById("boxColor").value

let infoHTML=""
let keys=document.getElementsByClassName("infoKey")
let values=document.getElementsByClassName("infoValue")
let colors=document.getElementsByClassName("infoColor")

for(let i=0;i<keys.length;i++){
infoHTML+=`
<tr>
<th style="background:${colors[i].value}">
${keys[i].value}
</th>
<td>
${values[i].value}
</td>
</tr>
`
}

let toc=""
let content=""
let titles=document.getElementsByClassName("secTitle")
let texts=document.getElementsByClassName("secText")

for(let i=0;i<titles.length;i++){
toc+=`${i+1}. ${titles[i].value}<br>`
content+=`
<h2 class="wiki-h">${i+1}. ${titles[i].value}</h2>
${texts[i].value}
`
}

let html=`
<div class="wiki-title">${title}</div>

<div class="wiki-infobox" style="border:3px solid ${boxColor}">
<img src="${image}" style="width:100%">
<table>
${infoHTML}
</table>
</div>

<div class="wiki-toc">
<b>목차</b><br>
${toc}
</div>

<iframe width="560" height="315"
src="${youtube}"
frameborder="0"
allowfullscreen></iframe>

${content}
`

document.getElementById("preview").innerHTML=html
document.getElementById("outputCode").textContent=html

}

function copyCode(){
let text=document.getElementById("outputCode").textContent
navigator.clipboard.writeText(text)
alert("코드가 복사되었습니다!")
}

</script>

</body>
</html>
